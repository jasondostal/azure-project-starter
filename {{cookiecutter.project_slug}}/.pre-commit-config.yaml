# ──────────────────────────────────────────────────────────────────────────────
# .pre-commit-config.yaml
#
# Pre-commit hooks — run automatically on every `git commit`.
# Installed by: pre-commit install  (happens automatically via package manager
#                                    post-install scripts).
#
# To run manually against all files:
#   pre-commit run --all-files
#
# To skip hooks for one commit (emergencies only):
#   git commit --no-verify -m "emergency hotfix"
# ──────────────────────────────────────────────────────────────────────────────

repos:
  # ── Secret detection (BLOCKS commit) ───────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── Generic file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Large file prevention ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=500]

{% if cookiecutter.project_type == 'dotnet-api' or cookiecutter.project_type == 'dotnet-web' %}
  # ── .NET ────────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: dotnet format --verify-no-changes --verbosity diagnostic --include
        language: system
        files: \.cs$
        pass_filenames: false

{% elif cookiecutter.project_type == 'python-function' %}
  # ── Python ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

{% elif cookiecutter.project_type == 'go-web' or cookiecutter.project_type == 'go-desktop' %}
  # ── Go ──────────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: go fmt ./...
        language: system
        files: \.go$
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        files: \.go$
        pass_filenames: false

{% elif cookiecutter.project_type == 'node-agent' %}
  # ── Node / TypeScript ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        files: \.(js|ts|svelte|css|html|json|md|yaml)$
        exclude: node_modules/|build/|.svelte-kit/

{% endif %}
