# ── Azure DevOps Pipeline — {{cookiecutter.project_name}} ────────────────────
#
# Generated from azure-project-starter ({{cookiecutter.project_type}} archetype).
# Consumes pipeline templates from azure-platform-iac.
#
# BUILD ONCE, DEPLOY MANY (single-branch model): one branch (main). A merge
# triggers ONE run that builds a single artifact and promotes that SAME artifact
# through a linear chain — dev → qa → staging → prod — gated by ADO Environment
# approvals (not by branch). No branch-per-environment.
#
# Variable groups (created by onboard-subscription.sh):
#   vg-{{cookiecutter.project_name}}-shared   # build config
#   vg-{{cookiecutter.project_name}}-dev / -qa / -staging / -prod   # SC + app name per env
#
# Environments: {{cookiecutter.project_name}}-dev, {{cookiecutter.project_name}}-qa,
#               {{cookiecutter.project_name}}-staging, {{cookiecutter.project_name}}-prod
# ──────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include: [main]

pr:
  branches:
    include: [main]

resources:
  repositories:
    - repository: platform
      type: git
      name: azure-platform-iac
      ref: main

variables:
  - group: vg-{{cookiecutter.project_name}}-shared
  - name: buildConfiguration
    value: 'Release'

stages:
  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD — runs on every trigger regardless of branch
  # ═══════════════════════════════════════════════════════════════════════════
  - stage: Build
    displayName: 'Build & Scan'
    jobs:
      - job: BuildApp
        displayName: 'Build {{cookiecutter.project_name}}'
        pool:
          vmImage: 'ubuntu-latest'
        steps:

{% if cookiecutter.project_type == 'dotnet-api' or cookiecutter.project_type == 'dotnet-web' %}
          - template: pipelines/templates/build-dotnet.yml@platform
            parameters:
              dotnetVersion: '10.x'
              solutionFile: '**/*.slnx'
              artifactName: '{{cookiecutter.project_name}}'

{% elif cookiecutter.project_type == 'python-function' %}
          - template: pipelines/templates/build-python.yml@platform
            parameters:
              pythonVersion: '3.12'
              sourceDir: 'src'
              artifactName: '{{cookiecutter.project_name}}'

{% elif cookiecutter.project_type == 'go-web' or cookiecutter.project_type == 'go-desktop' %}
          - template: pipelines/templates/build-go.yml@platform
            parameters:
              goVersion: '1.23'
              mainPackage: './cmd/app'
              binaryName: '{{cookiecutter.project_name | lower}}'
              targetType: '{{ "web" if cookiecutter.project_type == "go-web" else "desktop" }}'
              includeSPA: {{ 'true' if cookiecutter.project_type == 'go-web' else 'false' }}
              artifactName: '{{cookiecutter.project_name}}'

{% elif cookiecutter.project_type == 'node-agent' %}
          - template: pipelines/templates/build-node.yml@platform
            parameters:
              nodeVersion: '22'
              buildCmd: 'npm run build'
              artifactName: '{{cookiecutter.project_name}}'

{% endif %}

          # Security gates run for EVERY archetype — the scanners are
          # language-agnostic (gitleaks/trivy/semgrep). gitleaks is a HARD
          # gate; the rest warn. Wiring this once here (not per-archetype)
          # is the whole point of the platform: one source of truth, no repo
          # ships without secret scanning. The .NET-only steps (dotnet format,
          # NuGet vuln) are gated off for non-.NET archetypes.
          - template: pipelines/templates/security-gates.yml@platform
            parameters:
              dotnet: {{ 'true' if cookiecutter.project_type in ['dotnet-api', 'dotnet-web'] else 'false' }}

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY — linear promotion of the SAME artifact, approval-gated.
  # Each env dependsOn the previous (dev→qa→staging→prod); promotion is gated by
  # ADO Environment approvals, NOT by branch. Infra is deployed by
  # infra-pipeline.yml, so these stages deploy the app only (deployInfra=false).
  # go-desktop has no Azure target (build-go.yml ships to GitHub Releases).
  # ═══════════════════════════════════════════════════════════════════════════
{% if cookiecutter.project_type != 'go-desktop' %}
{% set deploy_target = "function" if cookiecutter.project_type == "python-function" else "web" %}

  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'dev'
      adoEnvironment: '{{cookiecutter.project_name}}-dev'
      dependsOn: ['Build']
      variableGroups: ['vg-{{cookiecutter.project_name}}-shared', 'vg-{{cookiecutter.project_name}}-dev']
      serviceConnection: '$(devServiceConnection)'
      appName: '$(devAppName)'
      targetType: '{{ deploy_target }}'
      artifactName: '{{cookiecutter.project_name}}'

  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'qa'
      adoEnvironment: '{{cookiecutter.project_name}}-qa'
      dependsOn: ['Deploy_dev']
      variableGroups: ['vg-{{cookiecutter.project_name}}-shared', 'vg-{{cookiecutter.project_name}}-qa']
      serviceConnection: '$(qaServiceConnection)'
      appName: '$(qaAppName)'
      targetType: '{{ deploy_target }}'
      artifactName: '{{cookiecutter.project_name}}'

  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'staging'
      adoEnvironment: '{{cookiecutter.project_name}}-staging'
      dependsOn: ['Deploy_qa']
      variableGroups: ['vg-{{cookiecutter.project_name}}-shared', 'vg-{{cookiecutter.project_name}}-staging']
      serviceConnection: '$(stagingServiceConnection)'
      appName: '$(stagingAppName)'
      targetType: '{{ deploy_target }}'
      artifactName: '{{cookiecutter.project_name}}'

  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'prod'
      adoEnvironment: '{{cookiecutter.project_name}}-prod'
      dependsOn: ['Deploy_staging']
      variableGroups: ['vg-{{cookiecutter.project_name}}-shared', 'vg-{{cookiecutter.project_name}}-prod']
      serviceConnection: '$(prodServiceConnection)'
      appName: '$(prodAppName)'
      targetType: '{{ deploy_target }}'
      artifactName: '{{cookiecutter.project_name}}'
{% endif %}
