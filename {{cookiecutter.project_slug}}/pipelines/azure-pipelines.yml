# ── Azure DevOps Pipeline — {{cookiecutter.project_name}} ────────────────────
#
# Generated from azure-project-starter ({{cookiecutter.project_type}} archetype).
# Consumes pipeline templates from azure-platform-iac.
#
# Variable groups (configure in ADO Library):
#   vg-{{cookiecutter.project_name}}-shared   # build config
#   vg-{{cookiecutter.project_name}}-dev      # dev service connection, app name
#   vg-{{cookiecutter.project_name}}-qa
#   vg-{{cookiecutter.project_name}}-staging
#   vg-{{cookiecutter.project_name}}-prod
#
# Environments: {{cookiecutter.project_name}}-dev, {{cookiecutter.project_name}}-qa,
#               {{cookiecutter.project_name}}-staging, {{cookiecutter.project_name}}-prod
# ──────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include: [dev, qa, stage, main, release/*]

pr:
  branches:
    include: [dev, qa, stage, main]

resources:
  repositories:
    - repository: platform
      type: git
      name: azure-platform-iac
      ref: main

variables:
  - group: vg-{{cookiecutter.project_name}}-shared
  - name: buildConfiguration
    value: 'Release'

stages:
  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD — runs on every trigger regardless of branch
  # ═══════════════════════════════════════════════════════════════════════════
  - stage: Build
    displayName: 'Build & Scan'
    jobs:
      - job: BuildApp
        displayName: 'Build {{cookiecutter.project_name}}'
        pool:
          vmImage: 'ubuntu-latest'
        steps:

{% if cookiecutter.project_type == 'dotnet-api' or cookiecutter.project_type == 'dotnet-web' %}
          - template: pipelines/templates/build-dotnet.yml@platform
            parameters:
              dotnetVersion: '10.x'
              solutionFile: '**/*.slnx'
              artifactName: '{{cookiecutter.project_name}}'

{% elif cookiecutter.project_type == 'python-function' %}
          - template: pipelines/templates/build-python.yml@platform
            parameters:
              pythonVersion: '3.12'
              sourceDir: 'src'
              artifactName: '{{cookiecutter.project_name}}'

{% elif cookiecutter.project_type == 'go-web' or cookiecutter.project_type == 'go-desktop' %}
          - template: pipelines/templates/build-go.yml@platform
            parameters:
              goVersion: '1.23'
              mainPackage: './cmd/app'
              binaryName: '{{cookiecutter.project_name | lower}}'
              targetType: '{{ "web" if cookiecutter.project_type == "go-web" else "desktop" }}'
              includeSPA: {{ 'true' if cookiecutter.project_type == 'go-web' else 'false' }}
              artifactName: '{{cookiecutter.project_name}}'

{% elif cookiecutter.project_type == 'node-agent' %}
          - template: pipelines/templates/build-node.yml@platform
            parameters:
              nodeVersion: '22'
              buildCmd: 'npm run build'
              artifactName: '{{cookiecutter.project_name}}'

{% endif %}

          # Security gates run for EVERY archetype — the scanners are
          # language-agnostic (gitleaks/trivy/semgrep). gitleaks is a HARD
          # gate; the rest warn. Wiring this once here (not per-archetype)
          # is the whole point of the platform: one source of truth, no repo
          # ships without secret scanning.
          - template: pipelines/templates/security-gates.yml@platform

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY — per-environment stages (dev, qa, staging, prod)
  # Each stage only fires when its branch is pushed.
  # ═══════════════════════════════════════════════════════════════════════════

{% if cookiecutter.project_type != 'go-desktop' %}
  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'dev'
      serviceConnection: '$(devServiceConnection)'
      appName: '$(devAppName)'
      targetType: '{{ "function" if cookiecutter.project_type == "python-function" else "web" }}'
      artifactName: '{{cookiecutter.project_name}}'
{% endif %}

  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'qa'
      serviceConnection: '$(qaServiceConnection)'
      appName: '$(qaAppName)'
      targetType: '{{ "function" if cookiecutter.project_type == "python-function" else "web" }}'
      artifactName: '{{cookiecutter.project_name}}'

  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'staging'
      serviceConnection: '$(stagingServiceConnection)'
      appName: '$(stagingAppName)'
      targetType: '{{ "function" if cookiecutter.project_type == "python-function" else "web" }}'
      artifactName: '{{cookiecutter.project_name}}'

  - template: pipelines/templates/deploy-environment.yml@platform
    parameters:
      environment: 'prod'
      serviceConnection: '$(prodServiceConnection)'
      appName: '$(prodAppName)'
      targetType: '{{ "function" if cookiecutter.project_type == "python-function" else "web" }}'
      artifactName: '{{cookiecutter.project_name}}'
