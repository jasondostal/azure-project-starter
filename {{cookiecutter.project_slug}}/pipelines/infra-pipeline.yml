{% if cookiecutter.project_type != 'go-desktop' %}
# ── Azure DevOps Pipeline — {{cookiecutter.project_name}} Infrastructure ──
#
# BUILD ONCE, DEPLOY MANY (single-branch model): one branch (main). Triggers
# only on infra/ changes. One run runs what-if, then promotes the apply through
# a linear chain — dev → qa → staging → prod — gated by ADO Environment
# approvals, NOT by branch.
# -----------------------------------------------------------------------------
trigger:
  branches:
    include: [main]
  paths:
    include: [infra/*]

pr:
  branches:
    include: [main]
  paths:
    include: [infra/*]

resources:
  repositories:
    - repository: platform
      type: git
      name: azure-platform-iac
      ref: main

variables:
  - group: vg-{{cookiecutter.project_name}}-shared

stages:
  - stage: WhatIf
    displayName: 'What-If (all envs)'
    jobs:
      - job: WhatIfAll
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - checkout: platform
          - script: az bicep build --file infra/main.bicep
            displayName: 'Bicep build (compile check)'
{% for env in ['dev', 'qa', 'staging', 'prod'] %}
          - task: AzureCLI@2
            displayName: 'What-If {{ env | upper }}'
            inputs:
              azureSubscription: '$({{ env }}ServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment sub what-if \
                  --location eastus \
                  --template-file infra/main.bicep \
                  --parameters infra/params/{{ env }}.bicepparam
{% endfor %}
{% for env in ['dev', 'qa', 'staging', 'prod'] %}
{% set prev = {'dev': 'WhatIf', 'qa': 'DeployDev', 'staging': 'DeployQa', 'prod': 'DeployStaging'} %}
  - stage: Deploy{{ env | capitalize }}
    displayName: 'Deploy Infra → {{ env | upper }}'
    dependsOn: {{ prev[env] }}
    jobs:
      - deployment: DeployInfra{{ env | capitalize }}
        displayName: 'Deploy infra to {{ env | upper }}'
        environment: '{{cookiecutter.project_name}}-{{ env }}'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - checkout: platform
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: '$({{ env }}ServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az deployment sub create \
                        --location eastus \
                        --template-file infra/main.bicep \
                        --parameters infra/params/{{ env }}.bicepparam
{% endfor %}
{% endif %}
